  <meta name="description" content="1. Introduction & Project Overview 
The Drone Simulator project is an interactive, real-time web application featuring a dual-device 
architecture. It enables a high-performance 3D flight rendering canvas on a primary web 
browser (the Viewer) while delegating manual flight telemetry inputs and look-angles to a 
secondary mobile interface (the Controller). 
The underlying framework utilizes Three.js for graphics and physics calculations alongside a 
Node.js and Socket.io server infrastructure to handle synchronous coordination between 
connected network nodes. It features collisions handled by localized octrees, responsive 
camera mechanics supporting third-person (TPV) and first-person (FPV) layouts, adaptive 
battery and range tracking, and automated network host resolution for painless local network 
cross-play." />
